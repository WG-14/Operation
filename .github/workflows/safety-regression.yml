name: safety-regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  offline-runtime-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: python3 tools/check_exchange_residue.py
      - run: uv run pytest -q tests/test_exchange_removal_contract.py tests/test_offline_paper_runtime.py tests/test_operation_cli_surface.py tests/test_accounting_projection.py tests/test_fill_dedupe.py tests/test_recovery.py tests/test_run_lock.py tests/test_paths.py tests/test_lot_native_contract.py tests/test_deploy_systemd_units.py
