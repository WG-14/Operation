name: research-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

jobs:
  research-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run research nightly suite
        run: |
          mkdir -p test-logs
          ./scripts/run_research_nightly_tests.sh | tee test-logs/research-nightly.log
      - name: Upload research nightly logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-nightly-logs
          path: test-logs/
          if-no-files-found: warn
