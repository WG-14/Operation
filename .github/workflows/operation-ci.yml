name: operation-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  operation-safety:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      NTFY_TOPIC: ""
      NOTIFIER_WEBHOOK_URL: ""
      SLACK_WEBHOOK_URL: ""
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
      NOTIFIER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: python3 tools/check_exchange_residue.py
      - run: uv run pytest -q tests/test_exchange_removal_contract.py tests/test_operation_test_inventory.py
      - run: ./scripts/run_operation_tests.sh
      - run: uv run pytest -q
      - run: uv build
